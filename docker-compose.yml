version: '3.8'

services:
  are-reporting:
    build: .
    container_name: are-reporting-app
    ports:
      - "3000:3000"
    volumes:
      - are_data:/app/data
    environment:
      - DB_PATH=/app/data/orders.db
      - NODE_ENV=production
      - DEV_MOCK_USER=aelyoussfi
    restart: always

volumes:
  are_data:
